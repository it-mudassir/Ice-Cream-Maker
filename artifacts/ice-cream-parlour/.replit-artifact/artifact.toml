kind = "web"
previewPath = "/"
title = "Ice Cream Parlour"
version = "1.0.0"
id = "artifacts/ice-cream-parlour"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26048

[services.development]
run = "pnpm --filter @workspace/ice-cream-parlour run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ice-cream-parlour", "run", "build" ]
publicDir = "artifacts/ice-cream-parlour/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26048"
BASE_PATH = "/"
